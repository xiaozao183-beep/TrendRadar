# ===============================================================
# TrendRadar 配置文件 (防卡死 & Debug 排查版)
# ===============================================================

# --- 1. 数据源 - 平台热榜 ---
platforms:
  enabled: true
  sources:
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
      expected_domain: "wallstreetcn.com"

# --- 2. RSS 精准订阅源 (仅保留国内直连极快源，防止网络卡死) ---
rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 3

  feeds:
    - id: "sspai"
      name: "少数派"
      url: "https://sspai.com/feed"

    - id: "jiqizhixin"
      name: "机器之心"
      url: "https://www.jiqizhixin.com/rss"

# --- 3. 强制关键词过滤 ---
report:
  mode: "current"
  display_mode: "keyword"
  keywords:
    - "AI"
    - "LLM"
    - "Agent"
    - "提效"
    - "工作流"
    - "Dify"
    - "Coze"
    - "RAG"
    - "代码"
    - "Prompt"
    - "变现"
    - "副业"
    - "独立开发"
    - "工具"
    - "开源"

# --- 4. 推送与区域控制 ---
display:
  region_order:
    - ai_analysis
    - rss
    - hotlist

  regions:
    hotlist: true
    new_items: false
    rss: true
    standalone: false
    ai_analysis: true

# --- 5. AI 模型统一配置 (缩短超时，防死等) ---
ai:
  provider: "openai"
  model: "deepseek-chat"
  api_key: "sk-fb91bc27e6d0416da0ffba18fbc6699d"  # ⚠️ 必须替换为你真实的 sk-xxxx 密钥
  api_base: "https://api.deepseek.com/v1"
  timeout: 30                     # 缩短 AI 超时时间至 30 秒
  temperature: 0.3
  max_tokens: 3000

ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 50
  include_rss: true
  include_standalone: false
  include_rank_timeline: false

# --- 6. 通知与本地存储 ---
notification:
  enabled: false

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0

advanced:
  debug: true                     # ⚠️ 开启 DEBUG 模式！终端会显示具体卡在哪个环节
  crawler:
    request_interval: 1000
  rss:
    request_interval: 1000
    timeout: 5                    # ⚠️ RSS 单个源超时限制降为 5 秒，防止一直卡住
    use_proxy: false
