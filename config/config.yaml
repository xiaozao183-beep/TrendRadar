# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件 (深度 AI 商业与落地版)
# ═══════════════════════════════════════════════════════════════

app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: false
  preset: "morning_evening"

# ===============================================================
# 2. 数据源 - 热榜平台 (60% 国内权重，主打深度调研与可信平台)
# ===============================================================
platforms:
  enabled: true
  api_url: "" 
  sources:
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
      expected_domain: "wallstreetcn.com"

    - id: "zhihu"
      name: "知乎热榜"
      expected_domain: "zhihu.com"        # 获取国内一线开发者关于大模型架构、底层代码逻辑的深度探讨与硬核分享

    - id: "thepaper"
      name: "澎湃新闻"
      expected_domain: "thepaper.cn"      # 权威背书，追踪“人工智能+”国家级政策、算力基建招标等明确的政企落地信号

# ===============================================================
# 3. 数据源 - RSS 订阅 (补充国内顶级 AI 垂直媒体与海外硬核技术源)
# ===============================================================
rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 2                       # 保证时效，聚焦48小时内高价值产业动态

  feeds:
    # --- 国内硬核 AI 科技与商业媒体 (补充占比) ---
    - id: "jiqizhixin"
      name: "机器之心"
      url: "https://www.jiqizhixin.com/rss" # 国内最权威的 AI 垂直媒体，涵盖大模型前沿论文、硬核技术拆解与产业落地案例
      
    - id: "geekpark"
      name: "极客公园"
      url: "https://www.geekpark.net/rss"   # 聚焦科技商业逻辑与 AI 产品经理视角，适合挖掘痛点和变现场景

    - id: "sspai"
      name: "少数派"
      url: "https://sspai.com/feed"         # 关注 AI 效率工具、独立开发者的轻量级变现与提效经验分享
      
    - id: "36kr-rss"
      name: "36氪资讯"
      url: "https://36kr.com/feed"          # 36氪官方 RSS
      
    - id: "huxiu-rss"
      name: "虎嗅资讯"
      url: "https://rsshub.app/huxiu/article" # 虎嗅的文章源 (若官方失效可使用此 RSSHub 节点)
    # --- 全球顶级科技与核心技术前沿 (40% 海外权重，原生直连) ---
    - id: "techcrunch"
      name: "TechCrunch Startups/AI"
      url: "https://techcrunch.com/feed/"   # 全球 AI 商业模式验证的第一现场，直接追踪海外哪些应用正在获得真金白银的融资

    - id: "hacker-news"
      name: "Hacker News"
      url: "https://hnrss.org/frontpage"    # 硅谷极客最前沿讨论，过滤出底层算法与工程化落地的真实反馈

# ===============================================================
# 4. 报告模式与展示控制
# ===============================================================
report:
  mode: "current"
  display_mode: "keyword"
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 0

filter:
  method: "ai"                            # 强依赖 AI 语义识别，彻底屏蔽“震惊体”和无商业价值的水文
  priority_sort_enabled: true

ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.75                         # 【调高阈值】从 0.6 提升至 0.75，宁缺毋滥，只看高质量的市场调研与落地案例
  reclassify_threshold: 0.7
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"

# ===============================================================
# 5. 推送区域控制
# ===============================================================
display:
  region_order:
    - new_items
    - hotlist
    - rss
    - standalone
    - ai_analysis

  regions:
    hotlist: true
    new_items: false
    rss: true
    standalone: false
    ai_analysis: true                     # 开启 AI 深度商业分析总结

  standalone:
    platforms: ["36kr", "zhihu"]          # 独立展示区优先保障 36氪的深度文章和知乎的硬核技术分享
    rss_feeds: ["jiqizhixin", "techcrunch"]
    max_items: 15

# ===============================================================
# 6. 通知与存储设置
# ===============================================================
notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0

# ===============================================================
# 8. AI 模型与分析配置 (全量联动 AI，提炼商业机会)
# ===============================================================
ai:
  model: "deepseek/deepseek-v4-flash"    
  api_key: "sk-9715dc693a35494e8fe0659532e9e477"
  api_base: ""
  timeout: 120
  temperature: 0.7                        # 【调低温度】从 1.0 降至 0.7，让 AI 生成的分析更加严谨、客观，适合市场调研报告的口吻
  max_tokens: 5000

ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 150
  include_rss: true                       
  include_standalone: true
  include_rank_timeline: false           

ai_translation:
  enabled: true                           # 自动无缝抹平语言壁垒，直接获取 TechCrunch/HackerNews 第一手英文原版的底层逻辑与商业模式，无需手动查词典
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  batch_size: 100
  batch_interval: 2
  scope:
    hotlist: false
    rss: true
    standalone: true

advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  crawler:
    request_interval: 2000
    use_proxy: false
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
