# ===============================================================
# TrendRadar 配置文件 (AI提效与实操变现定制版)
# ===============================================================

# --- 1. AI 分析模型配置 ---
ai_analysis:
  enabled: true
  provider: "openai"              # 使用 DeepSeek 或 OpenAI 兼容接口
  model: "deepseek-chat"          # 可更换为你使用的模型名称
  api_key: "sk-df38fe5f8ccd4cb5802eff083de3fac5"    # 请替换为你的 API Key (注意不要包含中文引号)
  api_base: "https://api.deepseek.com/v1"
  language: "zh-CN"
  include_rss: true              # 必须开启：AI 将深度分析 RSS 干货
  include_standalone: false       # 关闭独立展示区，减少不必要的 token 消耗与噪声

# --- 2. 平台热榜数据源 (仅保留高信噪比商业/科技源) ---
platforms:
  enabled: true
  sources:
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
      expected_domain: "wallstreetcn.com" # 用于观察 AI 产业资本与商业化落地方向

# --- 3. RSS 精准订阅源 (聚焦：AI提效、工作流、独立开发、赚钱案例) ---
rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 3              # 过滤 3 天内的最新干货

  feeds:
    # --- 【AI 工作流 & 提效工具类】---
    - id: "sspai"
      name: "少数派"
      url: "https://sspai.com/feed" # 专注于 AI 效率工具、工作流（Dify/Coze/Prompt）搭建实操

    - id: "jiqizhixin"
      name: "机器之心"
      url: "https://www.jiqizhixin.com/rss" # 最新 AI 工具、开源代码与工程落地

    # --- 【独立开发、副业接单与变现讨论】---
    - id: "v2ex-creative"
      name: "V2EX-创意与独立开发"
      url: "https://rsshub.app/v2ex/tab/creative" # 程序员分享自己做的小工具、AI变现尝试与接单案例

    - id: "v2ex-tech"
      name: "V2EX-技术与AI"
      url: "https://rsshub.app/v2ex/tab/tech" # 真实开发者的 AI 提效工具踩坑与实战经验

    # --- 【全球 AI 开源项目与商业化弱信号】---
    - id: "github-trending"
      name: "GitHub Trending"
      url: "https://rsshub.app/github/trending/daily/any" # 全球开发者正在做的 AI 微型工具/轮子

    - id: "hacker-news-ai"
      name: "Hacker News (AI)"
      url: "https://hnrss.org/newest?q=AI+OR+LLM+OR+Agent" # 硅谷工程师关于 AI 自动化与商业化的实操讨论

# --- 4. 强制关键词过滤 (过滤一切吃瓜新闻，只留硬核干货) ---
report:
  mode: "current"
  display_mode: "keyword"         # 开启关键词匹配模式
  keywords:
    # 维度 A：AI 提效与工程实操
    - "提效"
    - "工作流"
    - "Agent"
    - "Dify"
    - "Coze"
    - "RAG"
    - "知识库"
    - "自动化"
    - "Copilot"
    - "代码"
    - "Prompt"
    - "脚本"
    
    # 维度 B：AI 落地变现与商业机会
    - "变现"
    - "副业"
    - "独立开发"
    - "接单"
    - "工具"
    - "商业化"
    - "付费"
    - "案例"
    - "赚钱"
    - "开源项目"



# ===============================================================
# 5. 推送区域控制
# ===============================================================
display:
  region_order:
    - ai_analysis                         # 将 AI 深度商业分析总结置顶，先看大盘结论
    - standalone
    - rss
    - hotlist
    - new_items

  regions:
    hotlist: true
    new_items: false
    rss: true
    standalone: true                      # 开启独立展示区
    ai_analysis: true                     

  standalone:
    platforms: ["zhihu"]                  
    rss_feeds: ["a16z", "hacker-news", "jiqizhixin"] # 让最顶级的商业洞察和硬核技术独立高亮展示
    max_items: 10

# ===============================================================
# 6. 通知与存储设置 (保持不变)
# ===============================================================
notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0

# ===============================================================
# 8. AI 模型与分析配置 (严谨、务实、直击痛点)
# ===============================================================
ai:
  model: "deepseek/deepseek-v4-flash"    
  api_key: "sk-df38fe5f8ccd4cb5802eff083de3fac5"    # 出于安全考虑已为你隐去
  api_base: ""
  timeout: 120
  temperature: 0.5                        # 【调低温度至 0.5】约束 AI 的发散性，强迫其输出结构化、事实性强、逻辑严密的商业提炼
  max_tokens: 5000

ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"   # 建议在此 Prompt 中要求 AI 必须输出：“技术难点”、“目标客群”与“可直接落地的副业/商业切入点”
  mode: "follow_report"
  max_news_for_analysis: 100              # 因为过滤极严，分析基数下调至 100 即可覆盖高分内容
  include_rss: true                       
  include_standalone: true
  include_rank_timeline: false            

ai_translation:
  enabled: true                           # 自动无缝抹平语言壁垒，直接消化 A16Z 和 HackerNews 原生内容
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  batch_size: 100
  batch_interval: 2
  scope:
    hotlist: false
    rss: true
    standalone: true

advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  crawler:
    request_interval: 2000
    use_proxy: false
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
