# ═══════════════════════════════════════════════════════════════
#                   TrendRadar 配置文件 (极客与 AI 商业探勘专版)
# ═══════════════════════════════════════════════════════════════

app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: false
  preset: "morning_evening"

# ===============================================================
# 2. 数据源 - 热榜平台 (聚焦深度研讨与宏观资金流向)
# ===============================================================
platforms:
  enabled: true
  api_url: "" 
  sources:
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
      expected_domain: "wallstreetcn.com" # 关注宏观大环境、美股 AI 巨头财报与算力基建资金流向



# ===============================================================
# 3. 数据源 - RSS 订阅 (只保留高信任度、高商业价值的全球顶级源)
# ===============================================================
rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 2                       # 保持 48 小时内的极速商业嗅觉

  feeds:
    # --- 国内高信任度 AI 垂直与商业媒体 ---
    - id: "jiqizhixin"
      name: "机器之心"
      url: "https://www.jiqizhixin.com/rss" # 国内权威 AI 媒体：前沿论文解读、硬核技术拆解、大厂落地案例
      
    # --- 【独立开发、程序员真实接单与变现讨论】---
    - id: "v2ex-creative"
      name: "V2EX-创意与独立开发"
      url: "https://rsshub.app/v2ex/tab/creative"

    - id: "v2ex-tech"
      name: "V2EX-技术与AI"
      url: "https://rsshub.app/v2ex/tab/tech"
      
# --- 【全球开源项目与微型工具变现弱信号】---
    - id: "github-trending"
      name: "GitHub Trending"
      url: "https://rsshub.app/github/trending/daily/any"

    - id: "hacker-news-ai"
      name: "Hacker News (AI)"
      url: "https://hnrss.org/newest?q=AI+OR+LLM+OR+Agent"

# ===============================================================
# 4. 报告模式与展示控制
# ===============================================================
# --- 3. 强制关键词过滤 (彻底阻断八卦新闻与宏观炒作) ---
report:
  mode: "current"
  display_mode: "keyword"
  keywords:
    - "AI"
    - "LLM"
    - "Agent"
    - "提效"
    - "工作流"
    - "Dify"
    - "Coze"
    - "RAG"
    - "知识库"
    - "自动化"
    - "Copilot"
    - "代码"
    - "Prompt"
    - "脚本"
    - "变现"
    - "副业"
    - "独立开发"
    - "接单"
    - "工具"
    - "商业化"
    - "付费"
    - "案例"
    - "赚钱"
    - "开源"

filter:
  method: "ai"                            # 彻底屏蔽“震惊体”和无落地价值的水文
  priority_sort_enabled: true

ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.80                         # 【调高阈值至 0.80】极致的宁缺毋滥，只留下具备真实商业价值或技术突破的信息
  reclassify_threshold: 0.75
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"

# ===============================================================
# 5. 推送区域控制
# ===============================================================
# --- 4. 推送与区域控制 ---
display:
  region_order:
    - ai_analysis                 # 置顶 AI 深度提炼报告
    - rss
    - hotlist

  regions:
    hotlist: true
    new_items: false
    rss: true
    standalone: true                      # 开启独立展示区
    ai_analysis: true                     

# ===============================================================
# 6. 通知与存储设置 (保持不变)
# ===============================================================
notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0

# ===============================================================
# 8. AI 模型与分析配置 (严谨、务实、直击痛点)
# ===============================================================
ai:
  model: "deepseek/deepseek-v4-flash"    
  api_key: "sk-fb91bc27e6d0416da0ffba18fbc6699d"    # 出于安全考虑已为你隐去
  api_base: ""
  timeout: 120
  temperature: 0.3                        # 【调低温度至 0.5】约束 AI 的发散性，强迫其输出结构化、事实性强、逻辑严密的商业提炼
  max_tokens: 4000

ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"   # 建议在此 Prompt 中要求 AI 必须输出：“技术难点”、“目标客群”与“可直接落地的副业/商业切入点”
  mode: "follow_report"
  max_news_for_analysis: 100              # 因为过滤极严，分析基数下调至 100 即可覆盖高分内容
  include_rss: true                       
  include_standalone: true
  include_rank_timeline: false            

ai_translation:
  enabled: true                           # 自动无缝抹平语言壁垒，直接消化 A16Z 和 HackerNews 原生内容
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  batch_size: 100
  batch_interval: 2
  scope:
    hotlist: false
    rss: true
    standalone: true

advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  crawler:
    request_interval: 2000
    use_proxy: false
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
