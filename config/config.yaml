# ═══════════════════════════════════════════════════════════════
#                   TrendRadar 配置文件 (极客与 AI 商业探勘专版)
# ═══════════════════════════════════════════════════════════════

app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: false
  preset: "morning_evening"

# ===============================================================
# 2. 数据源 - 热榜平台 (聚焦深度研讨与宏观资金流向)
# ===============================================================
platforms:
  enabled: true
  api_url: "" 
  sources:
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
      expected_domain: "wallstreetcn.com" # 关注宏观大环境、美股 AI 巨头财报与算力基建资金流向

# ===============================================================
# 3. 数据源 - RSS 订阅 (只保留高信任度、高商业价值的全球顶级源)
# ===============================================================
rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 2                       # 保持 48 小时内的极速商业嗅觉

  feeds:
      # --- 1. 国内产业与科技深度 (砍掉泛新闻，专注硬核产业与商业) ---
    - id: "jiqizhixin"
      name: "机器之心"
      url: "https://www.jiqizhixin.com/rss" # 国内权威 AI 垂直媒体，涵盖大模型突破与硬核落地

    - id: "jazzyear"
      name: "甲子光年"
      url: "https://rsshub.app/jazzyear/article" # 专注科技产业融合、企业智能化转型与深度研报

    - id: "latepost"
      name: "晚点 LatePost"
      url: "https://rsshub.app/latepost/1"   # 科技大厂战术拆解、商业模式深度复盘

    # --- 2. 全球顶级风投、研报与极客变现 (海外硬核源) ---
    - id: "a16z"
      name: "A16Z Tech/AI"
      url: "https://a16z.com/feed/"         # 全球顶级风投 A16Z 研报，AI 商业化与创业风向标

    - id: "hacker-news"
      name: "Hacker News"
      url: "https://hnrss.org/frontpage"    # 硅谷工程师大本营，捕捉早期开源项目与技术变现弱信号

    - id: "github-trending"
      name: "GitHub Trending"
      url: "https://rsshub.app/github/trending/daily/any" # 随时捕捉全球开发者正在关注的 AI 微型工具与轮子

# ===============================================================
# 4. 报告模式与展示控制
# ===============================================================
report:
  mode: "current"
  display_mode: "keyword"
  keywords:
    - "AI"
    - "大模型"
    - "开源"
    - "架构"
    - "芯片"
    - "商业化"
    - "研报"
    - "工具"
    - "汽车"
filter:
  method: "ai"                            # 彻底屏蔽“震惊体”和无落地价值的水文
  priority_sort_enabled: true

ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.80                         # 【调高阈值至 0.80】极致的宁缺毋滥，只留下具备真实商业价值或技术突破的信息
  reclassify_threshold: 0.75
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"

# ===============================================================
# 5. 推送区域控制
# ===============================================================
display:
  region_order:
    - ai_analysis                         # 将 AI 深度商业分析总结置顶，先看大盘结论
    - standalone
    - rss
    - hotlist
    - new_items

  regions:
    hotlist: true
    new_items: false
    rss: true
    standalone: true                      # 开启独立展示区
    ai_analysis: true                     

  standalone:
    platforms: ["zhihu"]                  
    rss_feeds: ["a16z", "hacker-news", "jiqizhixin"] # 让最顶级的商业洞察和硬核技术独立高亮展示
    max_items: 10

# ===============================================================
# 6. 通知与存储设置 (保持不变)
# ===============================================================
notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0

# ===============================================================
# 8. AI 模型与分析配置 (严谨、务实、直击痛点)
# ===============================================================
ai:
  model: "deepseek/deepseek-v4-flash"    
  api_key: "sk-df38fe5f8ccd4cb5802eff083de3fac5"    # 出于安全考虑已为你隐去
  api_base: ""
  timeout: 120
  temperature: 0.5                        # 【调低温度至 0.5】约束 AI 的发散性，强迫其输出结构化、事实性强、逻辑严密的商业提炼
  max_tokens: 5000

ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"   # 建议在此 Prompt 中要求 AI 必须输出：“技术难点”、“目标客群”与“可直接落地的副业/商业切入点”
  mode: "follow_report"
  max_news_for_analysis: 100              # 因为过滤极严，分析基数下调至 100 即可覆盖高分内容
  include_rss: true                       
  include_standalone: true
  include_rank_timeline: false            

ai_translation:
  enabled: true                           # 自动无缝抹平语言壁垒，直接消化 A16Z 和 HackerNews 原生内容
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  batch_size: 100
  batch_interval: 2
  scope:
    hotlist: false
    rss: true
    standalone: true

advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  crawler:
    request_interval: 2000
    use_proxy: false
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
