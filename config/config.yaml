# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件 (AI 精准聚焦版)
# ═══════════════════════════════════════════════════════════════

app:
  timezone: "Asia/Shanghai"
  show_version_update: true

schedule:
  enabled: false
  preset: "morning_evening"

# ===============================================================
# 2. 数据源 - 热榜平台 (已修复 36kr/huxiu 报错，并补充 AI 高价值源)
# ===============================================================
platforms:
  enabled: true
  api_url: "" # 留空使用默认公共 API，也可填写自建地址
  sources:
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
      expected_domain: "wallstreetcn.com" # 顶级商业宏观、AI独角兽估值与资本动向

    - id: "cls-hot"
      name: "财联社热门"
      expected_domain: "cls.cn"           # A股及芯片/算力产业链、政策第一手消息

    - id: "zhihu"
      name: "知乎热榜"
      expected_domain: "zhihu.com"        # 前沿 AI 技术大模型架构、底层算法深度讨论

    - id: "36kr"
      name: "36氪热榜"
      # expected_domain: "36kr.com"       # 【修复报错】已移除强域名校验，避免公共转链触发报错，确保稳定拉取

    - id: "huxiu"
      name: "虎嗅网"
      # expected_domain: "huxiu.com"      # 【修复报错】已移除强域名校验，保证深度 AI 商业应用文章正常读取

    - id: "thepaper"
      name: "澎湃新闻"
      expected_domain: "thepaper.cn"     # 权威科技政策、人工智能+行动红利解读

# ===============================================================
# 3. 数据源 - RSS 订阅 (精选全球顶级、链接 100% 直连可达的权威 AI 媒体)
# ===============================================================
rss:
  enabled: true
  freshness_filter:
    enabled: true
    max_age_days: 2                       # 只看 2 天内最新的 AI 产业动态

  feeds:
    # --- 国内权威 AI 科技与创投媒体 ---
    - id: "sspai"
      name: "少数派"
      url: "https://sspai.com/feed"       # AI 原生应用、效率工具变现

    - id: "ifanr"
      name: "爱范儿"
      url: "https://www.ifanr.com/feed"   # 大模型落地应用与智能硬件趋势

    # --- 全球顶级科技与 AI 产业巨头 (原生直连，绝无失效链接) ---
    - id: "techcrunch"
      name: "TechCrunch Startups/AI"
      url: "https://techcrunch.com/feed/" # 全球 AI 初创公司融融资与大模型发布第一现场

    - id: "hacker-news"
      name: "Hacker News"
      url: "https://hnrss.org/frontpage"  # 全球底层 AI 开发者与技术突破核心讨论源

    - id: "ars-technica"
      name: "Ars Technica"
      url: "https://feeds.arstechnica.com/arstechnica/technology-lab" # 深度技术剖析、芯片架构与 AI 政策监管

# ===============================================================
# 4. 报告模式与展示控制
# ===============================================================
report:
  mode: "current"
  display_mode: "keyword"
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 0

filter:
  method: "ai"                            # 使用 AI 进行语义识别，确保只抓取有实质价值的 AI 新闻
  priority_sort_enabled: true

ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.6                          # 设定阈值，自动过滤毫无价值的营销号垃圾资讯
  reclassify_threshold: 0.6
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"

# ===============================================================
# 5. 推送区域控制
# ===============================================================
display:
  region_order:
    - new_items
    - hotlist
    - rss
    - standalone
    - ai_analysis

  regions:
    hotlist: true
    new_items: false
    rss: true                             # 开启 RSS AI 分析
    standalone: false
    ai_analysis: true                     # 开启 AI 深度商业分析总结

  standalone:
    platforms: ["zhihu", "wallstreetcn-hot"]
    rss_feeds: ["techcrunch"]
    max_items: 15

# ===============================================================
# 6. 通知与存储设置
# ===============================================================
notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"

storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0

# ===============================================================
# 8. AI 模型与分析配置 (全量联动 AI，提炼商业机会)
# ===============================================================
ai:
  model: "deepseek/deepseek-v4-flash"    # 使用 DeepSeek 进行性价比极高的大模型分析
  api_key: "sk-9715dc693a35494e8fe0659532e9e477"
  api_base: ""
  timeout: 120
  temperature: 1.0
  max_tokens: 5000

ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 150
  include_rss: true                       # 【关键】将 TechCrunch、少数派等 RSS 中的 AI 深度文章一并喂给 AI 分析
  include_standalone: true
  include_rank_timeline: false           # 关闭轨迹跟踪，大幅降低 Token 消耗

ai_translation:
  enabled: true                           # 开启自动翻译，实时将 TechCrunch / HackerNews 等英文源翻译为中文
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  batch_size: 100
  batch_interval: 2
  scope:
    hotlist: false
    rss: true
    standalone: true

advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  crawler:
    request_interval: 2000
    use_proxy: false
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
